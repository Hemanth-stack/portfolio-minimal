<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FFF8E7;
            --fg: #1B1464;
            --fg-muted: #7A75A0;
            --border: #E8DFC8;
            --accent: #E8DC3C;
            --radius: 8px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 17px;
            background: var(--bg);
            color: var(--fg);
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }
        .login-card {
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 30px rgba(27, 20, 100, 0.08);
        }
        h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            text-align: center;
        }
        .subtitle {
            text-align: center;
            color: var(--fg-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        label {
            display: block;
            margin-bottom: 0.3rem;
            font-size: 0.9rem;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 0.65rem 0.85rem;
            margin-bottom: 1.2rem;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            font-family: inherit;
            font-size: 1rem;
            background: var(--bg);
            color: var(--fg);
            transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: var(--fg); }
        button {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid var(--fg);
            background: var(--fg);
            color: var(--bg);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: var(--radius);
            font-family: inherit;
            transition: all 0.2s;
        }
        button:hover { opacity: 0.85; }
        .flash { padding: 0.75rem 1rem; margin-bottom: 1.2rem; border-radius: var(--radius); border: 1px solid; }
        .flash-error { background: #FFEBEE; color: #C62828; border-color: #EF9A9A; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Admin</h1>
        <p class="subtitle">Sign in to manage your portfolio</p>
        
        {% if error %}
        <div class="flash flash-error">{{ error }}</div>
        {% endif %}
        
        <form method="POST" action="/admin/login">
            <label for="username">Username</label>
            <input type="text" name="username" id="username" required autofocus>
            
            <label for="password">Password</label>
            <input type="password" name="password" id="password" required>
            
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
