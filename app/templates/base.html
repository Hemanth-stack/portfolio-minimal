<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{% block title %}{{ site.site_name }}{% endblock %}</title>
    
    <!-- SEO -->
    <meta name="description" content="{% block description %}{{ site.site_tagline }}{% endblock %}">
    <meta name="author" content="{{ site.site_name }}">
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
    <link rel="canonical" href="{{ settings.site_url }}{{ request.url.path }}">
    
    <!-- Open Graph -->
    <meta property="og:type" content="{% block og_type %}website{% endblock %}">
    <meta property="og:title" content="{% block og_title %}{{ site.site_name }}{% endblock %}">
    <meta property="og:description" content="{% block og_description %}{{ site.site_tagline }}{% endblock %}">
    <meta property="og:url" content="{{ settings.site_url }}{{ request.url.path }}">
    <meta property="og:site_name" content="{{ site.site_name }}">
    <meta property="og:locale" content="en_US">
    <meta property="og:image" content="{% block og_image %}{{ settings.site_url }}/static/profile.jpg{% endblock %}">
    
    <!-- Twitter -->
    <meta name="twitter:card" content="{% block twitter_card %}summary{% endblock %}">
    <meta name="twitter:title" content="{% block twitter_title %}{{ site.site_name }}{% endblock %}">
    <meta name="twitter:description" content="{% block twitter_description %}{{ site.site_tagline }}{% endblock %}">
    <meta name="twitter:image" content="{% block twitter_image %}{{ settings.site_url }}/static/profile.jpg{% endblock %}">
    
    <!-- RSS Autodiscovery -->
    <link rel="alternate" type="application/rss+xml" title="{{ site.site_name }} RSS Feed" href="{{ settings.site_url }}/feed.xml">
    
    <!-- DNS Prefetch -->
    <link rel="preconnect" href="{{ settings.site_url }}">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,700;1,400;1,500&display=swap" rel="stylesheet">
    
    <!-- Preload critical CSS -->
    <link rel="preload" href="/static/style.css?v=9" as="style">
    <link rel="stylesheet" href="/static/style.css?v=9">
    
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "{% block schema_type %}Person{% endblock %}",
        "name": {{ site.site_name|tojson }},
        "url": {{ settings.site_url|tojson }},
        "description": {{ site.site_tagline|tojson }},
        "sameAs": [
            {{ site.linkedin_url|tojson }},
            {{ site.github_url|tojson }}
        ]{% block schema_extra %}{% endblock %}
    }
    </script>
    
    {% block head %}{% endblock %}
</head>
<body>
    <header>
        <nav>
            <a href="/" class="site-title">{{ site.site_name }}</a>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/about">About</a>
                <a href="/projects">Work</a>
                <a href="/blog">Blog</a>
                <a href="/contact">Contact</a>
            </div>
            <div class="nav-social">
                <a href="{{ site.linkedin_url }}" rel="noopener" target="_blank" aria-label="LinkedIn" title="LinkedIn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                </a>
                <a href="{{ site.github_url }}" rel="noopener" target="_blank" aria-label="GitHub" title="GitHub">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
                </a>
            </div>
        </nav>
    </header>
    
    <main>
        {% block content %}{% endblock %}
    </main>
    
    <footer>
        <div class="footer-content">
            <p>© {{ now.year }} {{ site.site_name }}</p>
            <div class="footer-links">
                <a href="mailto:{{ site.site_email }}">Email</a>
                <a href="{{ site.linkedin_url }}" rel="noopener">LinkedIn</a>
                <a href="{{ site.github_url }}" rel="noopener">GitHub</a>
            </div>
        </div>
    </footer>
    
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const obs = new IntersectionObserver((entries) => {
            entries.forEach(e => {
                if (e.isIntersecting) {
                    e.target.classList.add('revealed');
                    obs.unobserve(e.target);
                }
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal-on-scroll').forEach(el => obs.observe(el));
    });
    </script>
    {% if is_admin %}
    <script src="/static/editor.js"></script>
    {% endif %}
    {% block scripts %}{% endblock %}
</body>
</html>
